name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true

      - name: gofmt
        run: |
          out=$(gofmt -l .)
          if [ -n "$out" ]; then
            echo "::error::gofmt found unformatted files:"
            echo "$out"
            echo "--- diff ---"
            gofmt -d .
            exit 1
          fi

      - name: go vet
        run: go vet ./...

      - name: go test
        run: go test -race -timeout 90s ./...

      - name: cross-compile ECU (linux/arm/v7)
        run: make ecu

      - name: build sidecar (linux/amd64)
        run: make sidecar
