name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          # Full history + tags so `git describe --tags` in the Makefile
          # returns the tag name as VERSION (otherwise it falls back to a
          # short SHA and the artifact filenames don't match the tag).
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: bun install + build (ecu-web SPA)
        working-directory: cmd/ecu-web/web
        run: |
          bun install --frozen-lockfile
          bun run build

      - name: go test
        run: go test -timeout 120s ./...

      - name: build all ARMv7 binaries
        run: make build-all-arm

      - name: build OpenAPS installer tarball
        run: make package-openaps

      - name: build per-binary tarballs
        run: |
          make package-zb
          make package-sunspec

      - name: fetch dropbear ARMv7 (for the openaps-dropbear .ipk)
        run: ./packaging/fetch-dropbear.sh build/dropbear-armv7

      - name: build .ipk packages
        run: make package-ipks VERSION="${GITHUB_REF_NAME}"

      - name: stage bootstrap assets (operators build the tarball locally)
        run: |
          mkdir -p build/bootstrap-assets
          cp packaging/openaps-bootstrap/assist build/bootstrap-assets/
          cp build/ipks/openaps-dropbear_*.ipk build/ipks/openaps-tls-proxy_*.ipk build/bootstrap-assets/

      - name: upload .ipks for the feed-publish job
        uses: actions/upload-artifact@v5
        with:
          name: ipks
          path: build/ipks/

      - name: generate SHA256SUMS
        working-directory: build
        run: |
          sha256sum openaps-v*-ecu.tar.bz2 ipks/*.ipk | sort -k 2 > SHA256SUMS
          cat SHA256SUMS

      - name: upload release artifacts (create release if missing)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1; then
            gh release upload "${GITHUB_REF_NAME}" \
              build/openaps-v*-ecu.tar.bz2 \
              build/ipks/*.ipk \
              build/bootstrap-assets/assist \
              build/SHA256SUMS \
              --clobber
          else
            gh release create "${GITHUB_REF_NAME}" \
              build/openaps-v*-ecu.tar.bz2 \
              build/ipks/*.ipk \
              build/bootstrap-assets/assist \
              build/SHA256SUMS \
              --title "OpenAPS ${GITHUB_REF_NAME}" \
              --notes-file docs/RELEASE.md
          fi

  # Sign the opkg feed index with the release key and publish it to gh-pages.
  # Isolated from the build job (which runs bun/make/third-party code) and gated
  # on the protected `release` environment, so the signing key is only ever in
  # this minimal, approval-gated job.
  publish-feed:
    needs: release
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: download freshly built .ipks
        uses: actions/download-artifact@v5
        with:
          name: ipks
          path: build/ipks

      - name: resolve channel + version
        run: |
          echo "CHANNEL=stable" >> "$GITHUB_ENV"
          echo "VERSION=${GITHUB_REF_NAME}" >> "$GITHUB_ENV"

      - name: fetch current feed (gh-pages) for only-changed diff
        run: |
          if git ls-remote --exit-code --heads origin gh-pages >/dev/null 2>&1; then
            git fetch origin gh-pages
            git worktree add feed origin/gh-pages
          else
            mkdir -p feed
          fi

      - name: assemble feed (content-hash only-changed)
        run: |
          mkdir -p staged
          go run ./cmd/mkfeed \
            -new build/ipks \
            -prev "feed/${CHANNEL}" \
            -out "staged/${CHANNEL}" \
            -version "${VERSION}"

      - name: sign the index with the release key
        env:
          RELEASE_KEY: ${{ secrets.OPENAPS_RELEASE_KEY }}
        run: |
          [ -n "$RELEASE_KEY" ] || { echo "::error::OPENAPS_RELEASE_KEY secret is empty"; exit 1; }
          gzip -9 -c "staged/${CHANNEL}/Packages" > "staged/${CHANNEL}/Packages.gz"
          umask 077
          printf '%s' "$RELEASE_KEY" > rk.pem
          openssl dgst -sha256 -sign rk.pem \
            -out "staged/${CHANNEL}/Packages.gz.sig" "staged/${CHANNEL}/Packages.gz"
          shred -u rk.pem 2>/dev/null || rm -f rk.pem
          # Sanity: the signature must verify against the committed public key
          # the deployed proxies pin, or every box would reject this feed.
          openssl dgst -sha256 -verify packaging/release.pub \
            -signature "staged/${CHANNEL}/Packages.gz.sig" "staged/${CHANNEL}/Packages.gz"

      - name: publish to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./staged/${{ env.CHANNEL }}
          destination_dir: ${{ env.CHANNEL }}
          keep_files: false
          commit_message: "feed: ${{ env.CHANNEL }} ${{ env.VERSION }}"

  # Build the openaps-bootstrap tarball — the payload a first-time operator
  # uploads via the stock exec_upgrade_ecu_app endpoint to convert a box: it
  # installs dropbear + tls-proxy, wires opkg to the feed, plants the operator
  # key, and sets a KNOWN root password. The root password and the authorized
  # key are baked from `release`-environment secrets, so this job is gated and
  # never exposes them to the build job's third-party (bun/make) steps. The make
  # target FAILS if ROOT_PW is empty, and this job asserts it too — a bootstrap
  # without a known root password could brick a box once stock is removed.
  bootstrap:
    needs: release
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: fetch dropbear ARMv7 (bundled in the bootstrap)
        run: ./packaging/fetch-dropbear.sh build/dropbear-armv7

      - name: build openaps-bootstrap (root pw baked from secret)
        env:
          # ROOT_PW reaches make via the environment (the Makefile reads it and
          # hashes via openssl -stdin), so it is never on argv / in process list.
          ROOT_PW: ${{ secrets.OPENAPS_BOOTSTRAP_ROOT_PW }}
        run: |
          [ -n "$ROOT_PW" ] || { echo "::error::OPENAPS_BOOTSTRAP_ROOT_PW is empty — refusing to build a bootstrap with no known root password"; exit 1; }
          # No bundled SSH key: first login is root + the baked password; the
          # operator adds their own key after first login.
          make package-bootstrap VERSION="${GITHUB_REF_NAME}"

      - name: attach bootstrap to the release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${GITHUB_REF_NAME}" \
            build/openaps-bootstrap-*.tar.gz --clobber
