name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Need full history + tags so `git describe --tags` in the Makefile
          # returns the tag name as VERSION (otherwise it falls back to a
          # short SHA and the artifact filenames don't match the tag).
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true

      - name: test
        run: go test -timeout 90s ./...

      - name: build cross-compiled binaries
        run: |
          make ecu
          make sidecar

      - name: build install package (without dropbear)
        run: make package

      - name: fetch dropbear and build bundled package
        run: |
          make fetch-dropbear
          make package-with-dropbear DROPBEAR_DIR=dist/dropbear-armv7

      - name: list artifacts
        run: ls -lh dist/

      - name: generate SHA256SUMS
        # Pinned algorithm + sorted file list = reproducible checksum file.
        # Verify on the install side with: sha256sum -c SHA256SUMS
        working-directory: dist
        run: |
          sha256sum \
            apsystems-sunspec-*.tar.bz2 \
            ecu-sunspec-linux-armv7 \
            ecu-sunspec-linux-amd64 \
            | sort -k 2 > SHA256SUMS
          cat SHA256SUMS

      - name: create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/apsystems-sunspec-*.tar.bz2
            dist/ecu-sunspec-linux-armv7
            dist/ecu-sunspec-linux-amd64
            dist/SHA256SUMS
          generate_release_notes: true
          fail_on_unmatched_files: true
