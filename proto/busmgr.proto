syntax = "proto3";

// Package busmgr.v1 is the wire schema between a bus-mgr backend
// (e.g. ecu-zb) and inv-driver. Framing is a 4-byte BE length prefix
// per wire.MaxFrameBytes (64 KiB cap).
package busmgr.v1;

option go_package = "github.com/bolkedebruin/openaps/wire;wire";

// Envelope is the single top-level message on every frame. Tag
// numbers 1..9 are upstream (backend -> driver); 10..29 are reserved
// for downstream (driver -> backend) so adding upstream fields cannot
// collide with downstream additions.
message Envelope {
  oneof body {
    Hello         hello         = 1;
    Telemetry     telemetry     = 2;
    DecodeFailed  decode_failed = 3;
    RawFrame      raw_frame     = 4;
    InverterInfo  info          = 5;
    FleetSummary  fleet         = 6;
    Protection    protection    = 7;

    Send                 send              = 10;
    Broadcast            broadcast         = 11;
    Reset                reset             = 12;
    SubscribeRaw         subscribe_raw     = 13;

    GridProfileRequest   grid_profile_req  = 14;
    GridProfileResponse  grid_profile_resp = 15;

    SystemStatusRequest  system_status_req  = 16;
    SystemStatusResponse system_status_resp = 17;

    EventsRequest        events_req         = 18;
    EventsResponse       events_resp        = 19;

    SettingsRequest      settings_req       = 20;
    SettingsResponse     settings_resp      = 21;

    // Pairing management. *_req/_resp are controller -> driver (ecu-web
    // starts/aborts/queries a pairing op). *_cmd/_result are driver ->
    // bus backend (ecu-zb): inv-driver's pairing state machine issues a
    // radio primitive and correlates the asynchronous result by req_id.
    PairingRequest       pairing_req        = 22;
    PairingResponse      pairing_resp       = 23;
    PairingCmd           pairing_cmd        = 24;
    PairingCmdResult     pairing_result     = 25;
  }
}

// Role enumerates how a peer participates on the UDS. PUBLISHER (the
// default for backward compatibility) streams Hello + telemetry into
// the driver. SUBSCRIBER receives a fan-out of decoded upstream
// envelopes (telemetry today; raw frames after decode).
enum Role {
  ROLE_UNSPECIFIED = 0;
  PUBLISHER        = 1;
  SUBSCRIBER       = 2;
}

// Hello is the first frame on every backend connection. The driver
// uses it to identify the bus backend (e.g. apsystems-stock-zb) and
// log version drift across restarts.
message Hello {
  string backend       = 1;  // e.g. "apsystems-stock-zb"
  string version       = 2;  // backend semver
  string hostname      = 3;
  int64  started_at_ms = 4;  // unix ms
  // Free-form capability strings.
  repeated string bus_caps = 5;
  // Role declares the peer's intent. Unset (ROLE_UNSPECIFIED) is
  // treated as PUBLISHER by the server for backward compatibility.
  Role role = 6;
}

// RawFrame is a reassembled L1 reply that the driver decodes itself.
// peer_uid is intentionally omitted: it lives inside the L1 envelope
// and the driver parses it during decode. See codec.ParseL1.
message RawFrame {
  int64  ts_ms      = 1;   // wall-clock at capture time
  uint32 short_addr = 2;   // 16-bit network short address
  bytes  l1_frame   = 3;   // full reassembled L1 reply (FC FC … FE FE)
}

// Telemetry is one decoded reply from one inverter. Mirrors
// codec.Reply plus a server-stamped ts_ms so the timeline doesn't
// depend on a synchronised clock between ECU and inv-driver hosts.
message Telemetry {
  int64  ts_ms          = 1;   // wall-clock at publish time
  uint32 short_addr     = 2;   // 16-bit network short address
  string peer_uid       = 3;   // 12-char hex
  uint32 cmd            = 4;   // L2 cmd (0xB1 QS1A, 0xBB DS3)
  string model          = 5;   // "QS1A" / "DS3" / "unknown(0x..)"
  double grid_v         = 6;
  double bus_v          = 7;
  double freq_hz        = 8;
  uint32 report_sec     = 9;
  double active_power_w = 10;
  double reactive_var   = 11;
  repeated Panel  panels        = 12;
  repeated uint64 lifetime_raw  = 13;
  double lifetime_scale = 14;
  reserved 15;            // body_hex
  // faults carries the family-specific named-bit decode of the
  // status block (DS3 body[0x0b..0x10] / QS1A body[0x17..0x1a +
  // 0x34 + 0x38..0x39]). Absent on frames the codec couldn't
  // family-classify.
  InverterFaults faults = 16;
  // rssi / lqi are L1 envelope bytes 4 and 5 — signal-quality bytes
  // the ZB modem stamps on every received reply. uint32 because
  // proto3 has no uint8; values fit in 0..255.
  uint32 rssi = 17;
  uint32 lqi  = 18;
  // prev_frame_ms is the wall-clock ts of the previous telemetry
  // frame inv-driver received for this UID, or 0 if none. Subscribers
  // can derive the inter-frame interval (this frame's ts_ms minus
  // prev_frame_ms) as a per-inverter response-time proxy.
  int64 prev_frame_ms = 19;
  // encrypted reflects the L1 gate byte of the frame this telemetry was
  // decoded from: true = AES-wrapped ciphertext, false = plaintext.
  // optional so unset means "frame type unknown" (e.g. legacy/direct
  // telemetry not decoded from a RawFrame) rather than "plaintext". Feeds
  // the ecu-web per-inverter encryption badge.
  optional bool encrypted = 20;
}

// InverterFaults dispatches on family. Each variant mirrors the
// codec's named-bit struct (codec.DS3Faults / codec.QS1AFaults).
// Bits whose meaning is not pinned by the firmware's Modbus packing
// (warning-bucket, legacy slots) are NOT carried here — consumers
// that need raw bytes should read RawFrame.
message InverterFaults {
  oneof family {
    DS3Faults  ds3  = 1;
    QS1AFaults qs1a = 2;
  }
}

// DS3Faults mirrors codec.DS3Faults — 18 named bits from the
// 5-byte status block at body[0x0b..0x10] of a DS3 reply.
// Semantics pinned by the firmware's Modbus packing.
message DS3Faults {
  bool grid_relay_fault      = 1;   // body[0x0c] bit 1 — 1=event/fault (per DS3_DS3D_status @ 0x290f8)
  bool dc_contactor_fault    = 2;   // body[0x0d] bit 7 — 1=event/fault
  bool dc_bus_fault          = 3;   // body[0x0d] bit 4 — 1=event/fault
  bool dc_ground_fault       = 4;   // body[0x0d] bit 3
  bool iso_fault_a           = 5;   // body[0x0e] bit 4
  bool iso_fault_b           = 6;   // body[0x0e] bit 6
  bool ac_over_volt_stage1   = 7;   // body[0x0e] bit 0
  bool ac_over_volt_stage2   = 8;   // body[0x0e] bit 2
  bool ac_under_volt_stage1  = 9;   // body[0x0e] bit 1
  bool ac_under_volt_stage2  = 10;  // body[0x0e] bit 3
  bool over_freq_stage1      = 11;  // body[0x0f] bit 2
  bool over_freq_stage2      = 12;  // body[0x0f] bit 4
  bool over_freq_aux         = 13;  // body[0x0f] bit 6
  bool over_freq_extra       = 14;  // body[0x0f] bit 0
  bool under_freq_stage1     = 15;  // body[0x0f] bit 3
  bool under_freq_stage2     = 16;  // body[0x0f] bit 5
  bool under_freq_aux        = 17;  // body[0x0f] bit 7
  bool under_freq_extra      = 18;  // body[0x0f] bit 1
}

// QS1AFaults mirrors codec.QS1AFaults — 24 named bits from
// body[0x17..0x1a], body[0x38..0x39], plus implicit ZB-link
// derivation. Semantics pinned by the firmware's Modbus packing.
message QS1AFaults {
  bool grid_relay_fault      = 1;   // body[0x17] bit 2 — 1=event/fault (per qs1200_60_status @ 0x297d8)
  bool dc_contactor_fault    = 2;   // body[0x17] bit 1 — 1=event/fault
  bool dc_ground_fault       = 3;   // body[0x17] bit 3
  bool dc_bus_fault          = 4;   // body[0x18] bit 4 — 1=event/fault
  bool comm_fault            = 5;   // body[0x17] bit 4
  bool over_temperature      = 6;   // body[0x18] bit 2
  bool iso_fault_a           = 7;   // body[0x19] bit 2
  bool iso_fault_b           = 8;   // body[0x19] bit 4
  bool iso_fault_c           = 9;   // body[0x18] bit 0
  bool iso_fault_d           = 10;  // body[0x19] bit 6
  bool ac_over_volt_fast     = 11;  // body[0x1a] bit 2
  bool ac_over_volt_slow     = 12;  // body[0x1a] bit 0
  bool ac_under_volt_fast    = 13;  // body[0x1a] bit 3
  bool ac_under_volt_slow    = 14;  // body[0x1a] bit 1
  bool over_freq_fast        = 15;  // body[0x1a] bit 6
  bool over_freq_slow        = 16;  // body[0x1a] bit 4
  bool over_freq_extra       = 17;  // body[0x19] bit 0
  bool over_freq_rms         = 18;  // body[0x17] bit 5
  bool under_freq_fast       = 19;  // body[0x1a] bit 7
  bool under_freq_slow       = 20;  // body[0x1a] bit 5
  bool under_freq_extra      = 21;  // body[0x19] bit 1
  bool under_freq_rms        = 22;  // body[0x17] bit 6
  bool zb_link_a             = 23;  // body[0x39] bit 0
  bool zb_link_b             = 24;  // body[0x39] bit 1
}

// Panel mirrors codec.Panel.
message Panel {
  int32  index = 1;
  double dc_v  = 2;
  double dc_i  = 3;
  double w     = 4;
}

// DecodeFailed records a frame the backend received but could not
// decode. Routed to events with kind=decode_failed.
message DecodeFailed {
  int64  ts_ms      = 1;
  uint32 short_addr = 2;
  string error      = 3;
  string raw_hex    = 4;  // may be truncated
}

// Send addresses one inverter by peer_uid. frame carries the L2 body
// (FB FB ... FE FE) only; the bus-mgr backend resolves peer_uid to a
// short-address and wraps the outer L1 envelope before injection.
// short_addr, when nonzero, names the target short-address directly so
// the sender (e.g. inv-driver's telemetry poller, which holds the
// inventory) does not depend on the bus-mgr's learned peer_uid->SA map;
// zero means resolve peer_uid via inventory as before.
message Send {
  string peer_uid    = 1;
  bytes  frame       = 2;  // L2 only (FB FB ... FE FE)
  int64  deadline_ms = 3;
  uint32 short_addr  = 4;  // optional direct target SA; 0 = resolve peer_uid
}

// Broadcast carries an L2 body addressed to every inverter on the bus.
// The bus-mgr backend wraps the L1 outer envelope with SA=0.
message Broadcast {
  bytes frame       = 1;  // L2 only (FB FB ... FE FE)
  int64 deadline_ms = 2;
}

// Reset is a downstream stub. Server returns Unimplemented in v0.
message Reset {}

// SubscribeRaw is a downstream stub. Server returns Unimplemented in
// v0. Shape is intentionally empty until requirements firm up.
message SubscribeRaw {}

// FleetSummary is an inv-driver-derived view across the inverter
// inventory. Published on subscriber attach (replay) and whenever
// inventory changes. nameplate_total_w is the sum of per-inverter
// rated AC watts (codec.NameplateWattsForModel applied to each
// inverters.model_code). Inverters with unknown model codes
// contribute 0; inverter_count includes them so subscribers can
// detect partial-knowledge fleets.
message FleetSummary {
  int64  ts_ms              = 1;   // wall-clock at publish time
  uint32 nameplate_total_w  = 2;
  uint32 inverter_count     = 3;

  // Fleet-level energy in watt-hours, computed by inv-driver from its
  // own energy_lifetime + energy_period_anchor tables.
  //   lifetime_wh  : sum across all inverters/channels of raw*scale
  //   today_wh     : lifetime_wh - anchor at start of today
  //   month_wh     : lifetime_wh - anchor at start of month
  //   year_wh      : lifetime_wh - anchor at start of year
  uint64 lifetime_wh        = 4;
  uint64 today_wh           = 5;
  uint64 month_wh           = 6;
  uint64 year_wh            = 7;
}

// InverterInfo carries identity and pair-state metadata sniffed off
// the primary ZigBee modem. Optional fields use proto3 'optional' so
// an unset field means "no update for this column" rather than "value
// is 0".
message InverterInfo {
  int64  ts_ms                 = 1;
  string peer_uid              = 2;   // 12-char hex
  uint32 short_addr            = 3;
  optional uint32 model_code       = 4;
  optional uint32 software_version = 5;
  optional uint32 phase            = 6;   // 0 unknown, 1 single, 3 three
  optional bool   zigbee_bound     = 7;
  optional bool   turned_off_rpt   = 8;
}

// Protection carries one inverter's active grid-protection thresholds,
// read back from the inverter (the 0xDD/0xDE/0xD9 reply, decoded by
// codec.DecodeProtectionReply). Mirrors ecu-sunspec's ProtectionParams.
// Values are in native units (V, Hz, seconds; mode/PF are enums). Each
// is optional: absence = the inverter didn't report that field.
message Protection {
  string peer_uid = 1;   // 12-char hex
  int64  ts_ms    = 2;   // wall-clock at decode time
  string model    = 3;   // "DS3" / "QS1A"

  // values maps each APsystems 2-letter aps_code to its native value
  // (V, Hz, seconds; mode/enum as a number) — exactly the codec read map
  // (codec.ProtectionReading.Values), so a new param needs no proto change.
  // Replaces the previous fixed per-code field set (tags 4-36).
  reserved 4 to 36;
  map<string, double> values = 37;
}

// GridProfileRequest carries one grid-profile management operation. The
// client sets exactly one oneof field to indicate which operation to perform.
// Results are returned in a GridProfileResponse on the same connection.
message GridProfileRequest {
  oneof op {
    Empty        list_profiles    = 1;  // return all stored base profiles as JSON
    Empty        refresh_profiles = 2;  // reload profiles from the on-disk dir
    SelectBase   select_base      = 3;  // set the active base profile
    OverlaySet   set_overlay      = 4;  // upsert a per-inverter overlay
    ClearOverlay clear_overlay    = 5;  // remove the overlay for one inverter
    GetEffective get_effective    = 6;  // compute effective profile for one inverter
    Empty        get_status       = 7;  // return latest reconcile/verify reports
    Empty        list_overlays    = 8;  // return all stored overlays as JSON
    Empty        get_base         = 9;  // return the active base profile's per-code defaults
  }
}

// Empty is a placeholder for operations that carry no parameters.
message Empty {}

// SelectBase selects a stored base profile by its ID.
message SelectBase {
  string id = 1;
}

// OverlaySet upserts a per-inverter overlay. overlay_json must be a valid
// v1 overlay document (validated server-side before applying).
message OverlaySet {
  string uid          = 1;  // 12-char hex inverter UID
  bytes  overlay_json = 2;  // serialised Overlay document
}

// ClearOverlay removes the stored overlay for one inverter UID.
message ClearOverlay {
  string uid = 1;
}

// GetEffective requests the computed effective profile for one inverter.
message GetEffective {
  string uid = 1;
}

// GridProfileResponse is returned after every GridProfileRequest.
// ok=false and error non-empty indicate a failure; ok=true and json
// non-nil carry the structured result serialised as JSON.
message GridProfileResponse {
  bool   ok    = 1;
  string error = 2;
  bytes  json  = 3;  // structured result: profile list, effective profile, or status
}

// SystemStatusRequest asks inv-driver for ECU identity and the set of
// peers currently connected on the UDS (bus backend, north-side
// adapters, the web UI itself). Read-only; carries no parameters. Like
// GridProfileRequest it is handled on a controller-gated connection.
message SystemStatusRequest {}

// SystemStatusResponse describes the ECU and its connected peers at the
// moment the request was served.
message SystemStatusResponse {
  bool        ok    = 1;
  string      error = 2;
  int64       ts_ms = 3;
  EcuIdentity ecu   = 4;
  repeated PeerStatus peers = 5;
}

// EcuIdentity is the ECU's identity. ecu_id is operator-set in
// inv-driver's settings file; hostname is the box's OS hostname.
message EcuIdentity {
  string ecu_id   = 1;  // operator-set, from inv-driver settings
  string hostname = 2;  // OS hostname
}

// PeerStatus is one live UDS peer as inv-driver sees it (from the Hello
// frame + the OS peer credentials of the connection).
message PeerStatus {
  string backend         = 1;
  string version         = 2;
  string hostname        = 3;
  string role            = 4;  // "PUBLISHER" | "SUBSCRIBER"
  int64  connected_at_ms = 5;
  int32  peer_uid        = 6;  // SO_PEERCRED uid (-1 if unavailable)
  bool   controller      = 7;  // backend is on the controller allow-list
}

// EventsRequest queries the append-only events log. Empty string filters
// match any value; limit 0 uses the server default.
message EventsRequest {
  int64  since_ms     = 1;  // ts_ms >= since_ms
  string kind         = 2;  // exact kind, or "" for any
  string severity     = 3;  // exact severity, or "" for any
  string inverter_uid = 4;  // exact uid, or "" for any
  uint32 limit        = 5;  // 0 -> server default
}

// EventsResponse returns events newest-first.
message EventsResponse {
  bool            ok     = 1;
  string          error  = 2;
  repeated Event  events = 3;
}

// Event is one row of the append-only events log.
message Event {
  int64  id           = 1;
  int64  ts_ms        = 2;
  string inverter_uid = 3;
  string kind         = 4;
  string severity     = 5;  // info | warn | error | …
  uint32 short_addr   = 6;
  string detail       = 7;  // error / message text (events.error column)
  string raw_hex      = 8;
  // by attributes the event to its originating backend (the Hello-reported
  // name of the controller that caused it): "inv-driver", "ecu-web",
  // "ecu-sunspec", "reconciler", "inv-driver-cli", … Empty for legacy rows.
  string by           = 9;
}

// Settings is the operator-owned configuration inv-driver persists in its
// own settings file. Used as both the set payload and the response body.
message Settings {
  string ecu_id       = 1;
  string mac          = 2;
  string pan_override = 3;  // hex 16-bit, e.g. "0DCE"; empty = derive
  string zigbee_type  = 4;  // "apsystems" | "general" | "" (=apsystems)
  // inverter_names maps an inverter UID (12-char hex) to an operator
  // label shown in place of the UID.
  map<string, string> inverter_names = 5;
  // channel is the ZigBee radio channel (11-26); 0 = unset (use the
  // built-in default).
  uint32 channel = 6;
}

// SettingsRequest reads (get) or replaces (set) the settings. Set carries
// the full desired Settings; the server validates before persisting.
message SettingsRequest {
  oneof op {
    Empty    get = 1;
    Settings set = 2;
  }
}

// ── Pairing management ──────────────────────────────────────────────
//
// Two channels share these messages:
//   1. controller -> driver: PairingRequest / PairingResponse. ecu-web
//      starts an op, aborts the running op, or polls status. Only ONE
//      pairing op runs at a time (global pairing lock, mutually exclusive
//      with grid-profile broadcast). Fine-grained progress is in-memory
//      and read via GetStatus (NOT spammed into the events log); only
//      milestones (scan_started/inverter_found/bind_ok/migrate_ok/
//      rekey_committed/...) are written to events for audit.
//   2. driver -> bus backend: PairingCmd / PairingCmdResult. inv-driver's
//      state machine issues one radio primitive at a time and awaits the
//      matching PairingCmdResult (correlated by req_id) on the upstream
//      ingest path. ecu-zb owns the modem: it can park the radio on a PAN
//      /channel and hop channels while a primitive runs.

// PairingRequest is a controller-gated op (same gate as GridProfile:
// IsControllerBackend && IsControllerUID). Exactly one oneof field set.
message PairingRequest {
  oneof op {
    ScanStart       scan        = 1;  // discover inverters (fast|slow)
    AddById         add_by_id   = 2;  // insert a known serial, then bind
    ReplaceInverter replace     = 3;  // swap a dead unit, inherit config+slot
    FleetRekey      fleet_rekey = 4;  // move whole fleet to a new PAN
    Empty           abort       = 5;  // abort the running op (Safe-Abort)
    Empty           get_status  = 6;  // poll current op status (in-memory)
    FleetChangeChannel change_channel = 7;  // move whole fleet to a new RF channel
    RemoveById      remove_by_id = 8;  // evict (best-effort) + delete one inverter
  }
}

// RemoveById removes a single inverter from the fleet. force=false runs a
// best-effort EVICT first (re-PAN the unit to the rendezvous PAN 0xFFFF on
// the current operating channel) and then deletes its DB rows regardless of
// the evict outcome; force=true skips the evict and deletes outright (a
// mistyped/never-live entry). When the evict is attempted but fails the DB
// rows are still deleted and the caller is warned (via PairingStatus.Evicted
// false + Message in status_json) that the unit may reappear if it calls in
// again.
message RemoveById {
  string serial = 1;  // 12-digit decimal serial of the unit to remove
  bool   force  = 2;  // true → skip the evict, delete outright
}

// FleetChangeChannel moves every paired inverter to a new RF channel: each
// inverter is sent a directed 0x0F (set-inv-pan with the current PAN + new
// channel) while still reachable on the current channel, then the module
// follows to the new channel and short addresses are re-queried. Reversible:
// on failure the state machine restores the old channel. inv-driver does NOT
// validate the channel range (a ZigBee concern); the bus backend (ecu-zb)
// rejects an out-of-range channel. Persisted via Settings.channel on success.
message FleetChangeChannel {
  uint32 channel = 1;  // target RF channel (backend validates the range)
}

// ScanStart begins discovery. slow=false → "fast": one 0xD1 report-id
// solicitation on the module's current channel parked on PAN 0xFFFF.
// slow=true → "slow": sweep RF channels [chan_lo..chan_hi] on PAN 0xFFFF,
// dwelling dwell_ms per channel (caller default 11..26 @ ~2000ms). Slow
// AND any 0xFFFF op blacks out telemetry while the radio is off the
// operating PAN — the UI must warn. Found serials are bound after scan.
message ScanStart {
  bool   slow     = 1;
  uint32 chan_lo  = 2;  // 0 → server default (11)
  uint32 chan_hi  = 3;  // 0 → server default (26)
  uint32 dwell_ms = 4;  // 0 → server default (2000)
}

// AddById inserts a known 12-digit serial (off the inverter label) into
// the inverter set, then runs the bind (+ migrate if off-PAN) flow. No
// radio discovery needed.
message AddById {
  string serial = 1;  // 12-digit decimal serial
}

// ReplaceInverter swaps a failed unit for a new one: remove old_uid,
// discover/add new_serial (scan if empty), then apply old_uid's grid
// profile + power cap + array-layout slot to the replacement.
message ReplaceInverter {
  string old_uid    = 1;  // dead unit's serial
  string new_serial = 2;  // replacement serial; empty → scan to find it
}

// FleetRekey moves every paired inverter to new_pan via the 0xFFFF
// rendezvous (0x11 prime per inverter → 0x22 commit → module to new PAN
// → re-query short addrs). Reversible: on commit failure the state
// machine restores the old PAN. new_pan is 1-4 hex digits (like
// Settings.pan_override); empty → derive from MAC (not recommended for
// rekey). Persisted via Settings.pan_override, never ecu_eth0_mac.conf.
message FleetRekey {
  string new_pan  = 1;  // hex 16-bit, e.g. "0DCE"
  uint32 channel  = 2;  // 0 → keep current channel
}

// PairingResponse returns immediately for start/abort, or carries the
// current op status for get_status. status_json is a PairingStatus
// serialised as JSON (in-memory snapshot; the source of truth for the
// progress drawer).
message PairingResponse {
  bool   ok          = 1;
  string error       = 2;
  bytes  status_json = 3;  // PairingStatus JSON (op, stage, per-inverter, channel sweep)
}

// PairingCmd is one radio primitive driver -> bus backend. req_id
// correlates the asynchronous PairingCmdResult. Exactly one oneof set.
message PairingCmd {
  uint64 req_id = 1;
  oneof op {
    SetModulePan          set_module_pan = 2;  // 0x05: park module on pan/channel (use pan=0xFFFF for rendezvous)
    ReportIdScan          report_scan    = 3;  // 0xD1 on → collect 0x1D → 0xD2 off
    GetShortAddr          get_short_addr = 4;  // 0x0E directed
    SetInverterPanChannel set_inv_pan    = 5;  // 0x0F directed
    PrimeInverterPan      prime_inv      = 6;  // 0x11 prime
    CommitPanNow          commit_pan     = 7;  // 0x22 broadcast commit
    BindQuiet             bind_quiet     = 8;  // 0x08 directed (stop report-id)
    Empty                 get_module_pan = 9;  // read the backend's operating PAN
  }
}

// SetModulePan special PAN values (driver -> backend):
//   pan = 0xFFFF : temporary rendezvous park; the backend does NOT change its
//                  remembered operating PAN.
//   pan = 0      : restore to the backend's operating PAN (the value it set at
//                  bring-up / the last real set). The driver never needs to
//                  know the numeric PAN to restore — the radio owner (ecu-zb)
//                  resolves it. channel is ignored (backend's own is used).
//   pan = other  : set this PAN and adopt it as the new operating PAN (rekey).
// get_module_pan returns the backend's current operating PAN in
// PairingCmdResult.pan so the driver can prime/migrate inverters onto it
// without re-deriving it from settings.

message SetModulePan          { uint32 pan = 1; uint32 channel = 2; }
message ReportIdScan          { uint32 timeout_ms = 1; }  // 0 → server default
message GetShortAddr          { string serial = 1; }
message SetInverterPanChannel { string serial = 1; uint32 pan = 2; uint32 channel = 3; }
message PrimeInverterPan      { string serial = 1; uint32 pan = 2; uint32 channel = 3; }
message CommitPanNow          { uint32 pan = 1; uint32 channel = 2; }
message BindQuiet             { uint32 short_addr = 1; }

// PairingCmdResult is the asynchronous result of one PairingCmd, matched
// by req_id. found is populated only for report_scan; short_addr only for
// get_short_addr.
message PairingCmdResult {
  uint64 req_id    = 1;
  bool   ok        = 2;
  string error     = 3;
  repeated FoundInverter found = 4;  // report_scan: announcing units
  uint32 short_addr = 5;            // get_short_addr: assigned SA
  uint32 pan = 6;                   // get_module_pan: backend's operating PAN
  uint32 channel = 7;               // get_module_pan: backend's operating channel
}

// FoundInverter is one inverter that announced itself (0x1D reply) during
// a report-id scan.
message FoundInverter {
  string serial     = 1;  // 12-digit decimal
  uint32 short_addr = 2;  // 0 if not yet assigned
  bool   encrypted  = 3;  // announcement arrived AES-wrapped (CC EE/FC FC)
}

// EffectiveSettings reports the values inv-driver is actually using right
// now: the operator's settings with empty fields resolved against the live
// system (eth0 MAC, derived PAN, default zigbee type). The Settings screen
// shows these alongside the operator inputs so a working device with empty
// inputs doesn't look unconfigured.
message EffectiveSettings {
  string mac         = 1;
  string pan         = 2;  // 4 hex digits, uppercase, e.g. "0DCE"
  string zigbee_type = 3;
  uint32 channel     = 4;  // resolved ZigBee channel (settings or default 16)
}

// SettingsResponse returns ok/error plus the current settings after the op.
message SettingsResponse {
  bool              ok        = 1;
  string            error     = 2;
  Settings          settings  = 3;
  EffectiveSettings effective = 4;
}
