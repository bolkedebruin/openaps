# OpenAPS opkg feed, served by the loopback openaps-tls-proxy (S47), which
# runs persistently on 127.0.0.1:8071. opkg speaks plain HTTP to the proxy;
# the proxy upstreams to the GitHub feed over modern TLS and authenticates the
# index + every .ipk before opkg sees it. This file is /etc/opkg/openaps.conf
# on the box and is read by plain opkg.
src/gz openaps http://127.0.0.1:8071/

# /tmp is a 16 MiB tmpfs on this device; opkg's default download scratch
# overflows it on any real install. Move it to the 3.5G root fs under /home.
# (lists_dir stays at opkg's default /var/lib/opkg, already on the root fs;
# opkg 0.1.8 only accepts the positional `lists_dir` form, not `option`.)
option tmp_dir /home/openaps/opkg-tmp
