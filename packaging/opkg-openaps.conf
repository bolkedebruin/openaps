# OpenAPS opkg feed, served by the loopback openaps-tls-proxy.
# opkg speaks plain HTTP to 127.0.0.1; the proxy upstreams to the GitHub feed
# over modern TLS and authenticates the index + every .ipk before opkg sees it.
src/gz openaps http://127.0.0.1:8071/

# /tmp is a 16 MiB tmpfs on this device; opkg's default scratch and list dirs
# overflow it on any real install. Keep both on the 3.5G root fs under /home.
option tmp_dir /home/openaps/opkg-tmp
option lists_dir /home/openaps/opkg-lists
